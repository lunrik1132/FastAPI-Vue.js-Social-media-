version: "3.9"

services:
  backend:
    build: ./backend
    image: eshkerist666/blog:backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - ENV=development

  frontend:
    build: ./frontend
    image: eshkerist666/blog:frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend